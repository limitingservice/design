<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
    <!-- Fast aerodynamic top line -->
    <path d="M 20,80 Q 100,50 180,80" stroke="white" stroke-width="8" stroke-linecap="round" />
    
    <!-- Continuous Shield Lens -->
    <path d="M 25,82 C 40,130 90,130 100,105 C 110,130 160,130 175,82 Z" fill="#ff4d2e" fill-opacity="0.15" stroke="white" stroke-width="6" stroke-linejoin="round" />
    
    <!-- Sharp AR Tracking overlay -->
    <!-- Center target -->
    <path d="M 90,95 L 110,95 M 100,85 L 100,105" stroke="#ff4d2e" stroke-width="2" stroke-opacity="0.8" />
    
    <!-- Eye tracking bounding boxes -->
    <rect x="45" y="85" width="25" height="20" rx="4" stroke="#ff4d2e" stroke-width="2" stroke-dasharray="4 4" opacity="0.7" />
    <rect x="130" y="85" width="25" height="20" rx="4" stroke="#ff4d2e" stroke-width="2" stroke-dasharray="4 4" opacity="0.7" />
    
    <!-- Speed/Motion lines -->
    <path d="M 15,90 L 5,100 M 185,90 L 195,100" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
</svg>
