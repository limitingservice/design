<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Shimmering Gold Gradient -->
    <linearGradient id="goldShimmer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="20%" stop-color="#FBBF24" />
      <stop offset="50%" stop-color="#FEF08A">
        <animate attributeName="stop-color" values="#FBBF24;#FFFFFF;#FBBF24" dur="2s" repeatCount="indefinite" />
      </stop>
      <stop offset="80%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
      <animate attributeName="x1" values="-100%;100%" dur="2.5s" repeatCount="indefinite" />
      <animate attributeName="x2" values="0%;200%" dur="2.5s" repeatCount="indefinite" />
    </linearGradient>

    <!-- Crater 3D Indentation Gradient -->
    <radialGradient id="craterGrad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.8" />
      <stop offset="40%" stop-color="#000000" stop-opacity="0.2" />
      <stop offset="80%" stop-color="#FBBF24" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#FEF08A" stop-opacity="0.7" />
    </radialGradient>

    <!-- Clip Path for Moon Surface -->
    <clipPath id="moonClip">
      <circle cx="40" cy="32" r="14" />
    </clipPath>
  </defs>

  <!-- Dark Background -->
  <rect width="64" height="64" rx="14" fill="#0a0a0a"/>

  <!-- 'F' -->
  <path d="M 10 18 L 22 18 L 22 22 L 14 22 L 14 28 L 20 28 L 20 32 L 14 32 L 14 46 L 10 46 Z" fill="url(#goldShimmer)"/>

  <!-- Rotating Full Moon (Luna) -->
  <g>
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 40 32"
      to="360 40 32"
      dur="40s"
      repeatCount="indefinite"
    />
    <!-- Full Moon Base -->
    <circle cx="40" cy="32" r="14" fill="url(#goldShimmer)" />

    <!-- Moon Textures & Craters -->
    <g clip-path="url(#moonClip)">
      <path d="M 32 18 Q 42 16 50 26 T 38 40 Q 28 32 32 18 Z" fill="#000000" opacity="0.12" />
      <path d="M 34 42 Q 44 48 48 38 Q 38 36 34 42 Z" fill="#000000" opacity="0.15" />
      <path d="M 28 26 Q 34 22 36 28 Q 30 32 28 26 Z" fill="#000000" opacity="0.12" />

      <circle cx="34" cy="24" r="3" fill="url(#craterGrad)" />
      <circle cx="46" cy="28" r="4" fill="url(#craterGrad)" />
      <circle cx="39" cy="41" r="3.5" fill="url(#craterGrad)" />
      <circle cx="39" cy="31" r="1.5" fill="url(#craterGrad)" />
      <circle cx="51" cy="36" r="2.5" fill="url(#craterGrad)" />
      <circle cx="31" cy="33" r="1.5" fill="url(#craterGrad)" />
      <circle cx="44" cy="35" r="2" fill="url(#craterGrad)" />
      <circle cx="48" cy="25" r="1.2" fill="url(#craterGrad)" />
      <circle cx="35" cy="45" r="2" fill="url(#craterGrad)" />
    </g>
  </g>
</svg>
